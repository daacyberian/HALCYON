<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - HALCYON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-content { padding-top: calc(var(--navbar-height) + 2rem); min-height: 100vh; background: var(--color-bg); }
        .checkout-wrapper { max-width: 1000px; margin: 0 auto; background: var(--color-surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); overflow: hidden; }
        .progress-bar { width: 100%; background: var(--color-bg-alt); }
        .progress { height: 6px; background: linear-gradient(90deg, var(--color-primary) 60%, var(--color-accent) 100%); }
        .checkout-header { padding: 2rem; border-bottom: 1px solid var(--color-border-light); display: flex; align-items: center; gap: 1rem; }
        .checkout-header h1 { font-size: 1.75rem; color: var(--color-text); font-weight: 600; margin: 0; }
        .checkout-main { display: flex; flex-wrap: wrap; gap: 2rem; padding: 2rem; }
        .checkout-form { flex: 2; min-width: 320px; }
        .summary-card { flex: 1.2; min-width: 280px; background: var(--color-bg-alt); border-radius: var(--radius-lg); padding: 1.5rem; }
        .summary-card h2 { font-size: 1.125rem; color: var(--color-accent); margin-bottom: 1rem; font-weight: 600; }
        .cart-item { display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid var(--color-border-light); padding: 0.75rem 0; }
        .cart-item-img { width: 48px; height: 48px; object-fit: cover; border-radius: var(--radius-md); }
        .cart-item-name { flex: 1; font-weight: 500; color: var(--color-text); font-size: 0.9375rem; }
        .cart-item-qty, .cart-item-price { min-width: 60px; text-align: right; font-size: 0.875rem; }
        .cart-total { text-align: right; font-weight: 700; font-size: 1.25rem; margin-top: 1rem; color: var(--color-accent); }
        }
        .form-section {
            background: #f8fafd;
            border-radius: 14px;
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 12px rgba(52,152,219,0.07);
        }
        .form-section h2 {
            font-size: 1.2rem;
            color: #1a1a1a;
            margin-bottom: 1.2rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #34495e; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%; padding: 0.7rem; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus { border-color: #1a1a1a; outline: none; }
        .payment-methods {
            display: flex; gap: 1.5rem; margin-top: 0.5rem; margin-bottom: 1.2rem;
        }
        .payment-radio {
            accent-color: #1a1a1a;
            margin-right: 0.5rem;
        }
        .place-order-btn {
            background: linear-gradient(90deg, #1a1a1a 60%, #1a1a1a 100%);
            color: white; border: none; padding: 1rem 2.5rem;
            border-radius: 25px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
            display: block; margin: 2rem auto 0 auto;
            box-shadow: 0 2px 8px rgba(52,152,219,0.08);
        }
        .place-order-btn:hover { background: #1a1a1a; }
        .success-message, .error-message {
            text-align: center; padding: 1.2rem; border-radius: 10px; margin: 2rem 0 0 0; font-size: 1.1rem;
        }
        .success-message {
            background: #eafaf1; color: #1a1a1a; border: 1.5px solid #1a1a1a;
            display: flex; flex-direction: column; align-items: center;
        }
        .success-check {
            font-size: 3.5rem; color: #1a1a1a; margin-bottom: 0.5rem;
        }
        .error-message { background: #fde8e8; color: #e74c3c; border: 1.5px solid #e74c3c; }
        @media (max-width: 900px) {
            .checkout-main { flex-direction: column; padding: 1.2rem; }
            .checkout-header { padding: 2rem 1.2rem 1rem 1.2rem; }
        }
        @media (max-width: 600px) {
            .checkout-wrapper { padding: 0 0 1rem 0; }
            .checkout-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .checkout-main { padding: 0.5rem; }
            .form-section, .summary-card { padding: 1.2rem 0.7rem 1rem 0.7rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <img src="bird.png" alt="HALCYON">
                <span class="navbar-brand-text">HALCYON</span>
            </a>
            <div class="navbar-actions">
                <a href="index.html" class="btn btn-ghost">Cancel</a>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="checkout-wrapper">
            <div class="progress-bar"><div class="progress"></div></div>
            <div class="checkout-header">
                <h1>Checkout</h1>
            </div>
            <div class="checkout-main">
                <form class="checkout-form" id="billingForm">
                    <div class="form-section">
                        <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:1.5rem;color:var(--color-text);">Billing & Shipping Information</h2>
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required autocomplete="name">
                        </div>
                        <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" required autocomplete="street-address">
                    </div>
                    <div class="form-group">
                        <label for="contact">Contact Number</label>
                        <input type="text" id="contact" name="contact" required autocomplete="tel">
                    </div>
                </div>
                <div class="form-section">
                    <h2>Payment Method</h2>
                    <div class="payment-methods">
                        <label><input type="radio" class="payment-radio" name="payment" value="card" checked> Credit/Debit Card</label>
                        <label><input type="radio" class="payment-radio" name="payment" value="cod"> Cash on Delivery</label>
                    </div>
                    <div id="cardDetails">
                        <div class="form-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" name="cardNumber" maxlength="19" placeholder="1234 5678 9012 3456">
                        </div>
                        <div class="form-group" style="display:flex;gap:1rem;">
                            <div style="flex:1;">
                                <label for="expiry">Expiry</label>
                                <input type="text" id="expiry" name="expiry" maxlength="5" placeholder="MM/YY">
                            </div>
                            <div style="flex:1;">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" name="cvv" maxlength="4" placeholder="123">
                            </div>
                        </div>
                    </div>
                </div>
                <button type="submit" class="place-order-btn">Place Order</button>
                <div id="orderMessage"></div>
            </form>
            <div class="summary-card">
                <h2>Order Summary</h2>
                <div id="cartItems"></div>
                <div style="margin:1.2rem 0 0.5rem 0;">
                    <input type="text" id="discountCode" placeholder="Discount code" style="width:60%;padding:0.5rem;border-radius:8px;border:1.5px solid #ddd;font-size:1rem;">
                    <button type="button" id="applyDiscountBtn" style="background:#1a1a1a;color:white;padding:0.5rem 1.2rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-left:0.5rem;">Apply</button>
                    <div id="discountMsg" style="font-size:0.98rem;margin-top:0.5rem;"></div>
                </div>
                <div class="cart-total" id="subtotalRow">Subtotal: $<span id="cartSubtotal">0.00</span></div>
                <div class="cart-total" id="taxRow" style="color:#f39c12;">Sales Tax (18%): $<span id="cartTax">0.00</span></div>
                <div class="cart-total" id="discountRow" style="color:#e74c3c;display:none;">Discount: -$<span id="cartDiscount">0.00</span></div>
                <div class="cart-total" style="font-size:1.2rem;">Total: $<span id="cartTotal">0.00</span></div>
            </div>
        </div>
    </div>
    <div id="orderProgressBar" style="display:none; margin-top:2rem;">
        <div style="font-weight:600; margin-bottom:0.5rem;">Order Progress</div>
        <div style="background:#eee; border-radius:10px; height:20px; width:100%; position:relative;">
            <div id="progressFill" style="background:#1a1a1a; height:100%; width:0%; border-radius:10px; transition:width 0.5s;"></div>
            <div id="progressText" style="position:absolute; left:50%; top:0; transform:translateX(-50%); color:#fff; font-weight:600; line-height:20px;"></div>
        </div>
    </div>
    <script>
        let cart = [];
        let discount = 0;
        let discountPercent = 0;
        let discountCode = '';
        function getCurrentUser() {
            const storedUser = localStorage.getItem('currentUser');
            return storedUser ? JSON.parse(storedUser) : null;
        }
        function getSelectedItemsFromSession() {
            const stored = sessionStorage.getItem('checkoutItems');
            return stored ? JSON.parse(stored) : [];
        }
        async function fetchCartItems() {
            const user = getCurrentUser();
            if (!user || !user.token) return [];
            try {
                const response = await fetch('https://ecom-backend-alpha-rust.vercel.app/cart', {
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                if (response.ok) return await response.json();
            } catch (err) { }
            return [];
        }
        function renderCartItems() {
            const cartItemsDiv = document.getElementById('cartItems');
            const cartTotalSpan = document.getElementById('cartTotal');
            const cartSubtotalSpan = document.getElementById('cartSubtotal');
            const cartDiscountSpan = document.getElementById('cartDiscount');
            const cartTaxSpan = document.getElementById('cartTax');
            const discountRow = document.getElementById('discountRow');
            const taxRow = document.getElementById('taxRow');
            let subtotal = 0;
            if (!cart || cart.length === 0) {
                cartItemsDiv.innerHTML = '<p>Your cart is empty.</p>';
                cartTotalSpan.textContent = '0.00';
                cartSubtotalSpan.textContent = '0.00';
                cartTaxSpan.textContent = '0.00';
                if (discountRow) discountRow.style.display = 'none';
                if (taxRow) taxRow.style.display = 'block';
                return;
            }
            cartItemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.Price * item.Quantity;
                subtotal += itemTotal;
                const imgSrc = item.image || `https://picsum.photos/seed/${item.ProductID}/80/80`;
                return `
                    <div class="cart-item">
                        <img src="${imgSrc}" alt="${item.Name}" class="cart-item-img">
                        <span class="cart-item-name">${item.Name}</span>
                        <span class="cart-item-qty">x${item.Quantity}</span>
                        <span class="cart-item-price">$${itemTotal.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            cartSubtotalSpan.textContent = subtotal.toFixed(2);
            // Calculate tax
            const tax = subtotal * 0.18;
            cartTaxSpan.textContent = tax.toFixed(2);
            if (taxRow) taxRow.style.display = 'block';
            let totalAfterDiscount = subtotal;
            if (discountPercent > 0) {
                discount = (discountPercent / 100) * subtotal;
                cartDiscountSpan.textContent = discount.toFixed(2) + ` (${discountPercent}% OFF)`;
                totalAfterDiscount = subtotal - discount;
                if (discountRow) discountRow.style.display = 'block';
            } else {
                discount = 0;
                if (discountRow) discountRow.style.display = 'none';
            }
            // Add tax after discount
            const finalTotal = totalAfterDiscount + tax;
            cartTotalSpan.textContent = finalTotal.toFixed(2);
        }
        
        async function loadCart() {
            // First try to load selected items carried over from the product/cart page
            cart = getSelectedItemsFromSession();
            // If there are no items in session (user didn't explicitly select items),
            // fall back to fetching the full cart from server (if logged in)
            if (!cart || cart.length === 0) {
                try {
                    const fetched = await fetchCartItems();
                    if (fetched && fetched.length > 0) cart = fetched;
                } catch (e) {
                    // ignore and continue with empty cart
                }
            }
            renderCartItems();
        }
        loadCart();
        // Payment method toggle
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const cardDetails = document.getElementById('cardDetails');
                if (this.value === 'card') {
                    cardDetails.style.display = 'block';
                } else {
                    cardDetails.style.display = 'none';
                }
            });
        });
        // Hide card details if COD is selected by default
        document.addEventListener('DOMContentLoaded', function() {
            const cardDetails = document.getElementById('cardDetails');
            const selected = document.querySelector('input[name="payment"]:checked').value;
            cardDetails.style.display = selected === 'card' ? 'block' : 'none';
        });
        document.getElementById('applyDiscountBtn').onclick = async function() {
            const code = document.getElementById('discountCode').value.trim();
            const msgDiv = document.getElementById('discountMsg');
            if (!code) {
                msgDiv.textContent = 'Please enter a code.';
                msgDiv.style.color = '#e74c3c';
                return;
            }
            // Call backend to validate code
            try {
                const response = await fetch('https://ecom-backend-alpha-rust.vercel.app/discount/apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                const data = await response.json();
                if (response.ok && data.percent > 0) {
                    discountPercent = data.percent;
                    discountCode = code;
                    msgDiv.textContent = `Discount applied: ${discountPercent}% OFF!`;
                    msgDiv.style.color = '#1a1a1a';
                } else {
                    discountPercent = 0;
                    discountCode = '';
                    msgDiv.textContent = data.error || 'Invalid code.';
                    msgDiv.style.color = '#e74c3c';
                }
                renderCartItems();
            } catch (err) {
                discountPercent = 0;
                discountCode = '';
                msgDiv.textContent = 'Server error.';
                msgDiv.style.color = '#e74c3c';
                renderCartItems();
            }
        };
        document.getElementById('billingForm').onsubmit = async function(e) {
            e.preventDefault();
            const user = getCurrentUser();
            if (!user || !user.token) {
                showMessage('Please log in to place an order.', false);
                return;
            }
            if (!cart || cart.length === 0) {
                showMessage('Your cart is empty.', false);
                return;
            }
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const contact = document.getElementById('contact').value;
            const payment = document.querySelector('input[name="payment"]:checked').value;
            let cardNumber = '', expiry = '', cvv = '';
            if (payment === 'card') {
                cardNumber = document.getElementById('cardNumber').value.trim();
                expiry = document.getElementById('expiry').value.trim();
                cvv = document.getElementById('cvv').value.trim();
                if (!cardNumber || !expiry || !cvv) {
                    showMessage('Please fill in all card details.', false);
                    return;
                }
                // Simple validation (for demo)
                if (!/^\d{16}$/.test(cardNumber.replace(/\s/g, '')) || !/^\d{2}\/\d{2}$/.test(expiry) || !/^\d{3,4}$/.test(cvv)) {
                    showMessage('Invalid card details.', false);
                    return;
                }
            }
            let paymentMethod = payment;
            if (paymentMethod === 'card') {
                paymentMethod = 'Credit Card';
            } else if (paymentMethod === 'cod') {
                paymentMethod = 'COD';
            }
            // Calculate subtotal and tax for backend
            let subtotal = 0;
            cart.forEach(item => { subtotal += item.Price * item.Quantity; });
            const tax = subtotal * 0.18;
            const orderData = {
                customerId: user.CustomerID,
                name, email, address, contact,
                paymentMethod: paymentMethod,
                transactionId: 'txn_' + Date.now(),
                items: cart.map(item => ({
                productId: item.ProductID,
                quantity: item.Quantity,
                price: item.Price
                })),
                discount: discount,
                discountPercent: discountPercent,
                discountCode: discountCode,
                subtotal: subtotal,
                tax: tax
            };

            try {
                const response = await fetch('https://ecom-backend-alpha-rust.vercel.app/order/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify(orderData)
                });
                const data = await response.json();
                if (response.ok) {
                    let loyaltyMsg = '';
                    if (data.loyaltyPoints && data.loyaltyPoints > 0) {
                        loyaltyMsg = `<div style='margin-top:1rem;font-size:1.1rem;color:#f39c12;'>You earned <b>${data.loyaltyPoints}</b> loyalty points!</div>`;
                        // Update navbar badge if present
                        if (window.parent && window.parent.document.getElementById('loyaltyPointsCount')) {
                            window.parent.document.getElementById('loyaltyPointsCount').textContent = data.loyaltyPoints;
                        } else if (document.getElementById('loyaltyPointsCount')) {
                            document.getElementById('loyaltyPointsCount').textContent = data.loyaltyPoints;
                        }
                    }
                    showMessage('Order placed successfully! Thank you for shopping.' + loyaltyMsg, true, data.trackingNumber);
                    cart = [];
                    renderCartItems();
                    document.getElementById('billingForm').reset();
                    sessionStorage.removeItem('checkoutItems'); 
                    if (data.trackingNumber) {
                        showOrderProgressBar(data.trackingNumber);
                    }
                    // Notify dashboard to refresh recent orders
                    localStorage.setItem('refreshRecentOrders', Date.now().toString());
                } else {
                    showMessage(data.error || 'Order failed. Please try again.', false);
                }
            } catch (err) {
                showMessage('Server error. Please try again.', false);
            }
        };
        function showMessage(msg, success, trackingNumber) {
            const div = document.getElementById('orderMessage');
            if (success) {
                div.className = 'success-message';
                div.innerHTML = `<span class='success-check'>✔️</span>${msg}`;
                if (trackingNumber) {
                    div.innerHTML += `<div style='margin-top:1rem;font-size:1.1rem;color:#1a1a1a;'>Your Tracking Number: <b>${trackingNumber}</b></div>`;
                }
            } else {
                div.className = 'error-message';
                div.textContent = msg;
            }
        }
        function showOrderProgressBar(trackingId) {
            const bar = document.getElementById('orderProgressBar');
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            bar.style.display = 'block';
            fill.style.width = '0%';
            text.textContent = 'Fetching status...';

            // Fetch status from backend
            fetch(`https://ecom-backend-alpha-rust.vercel.app/trackinginfo?id=${trackingId}`)
                .then(res => res.json())
                .then(data => {
                    let status = data.Status || data.status || '';
                    let percent = 0;
                    let label = '';
                    if (status === 'In Transit') {
                        percent = 60;
                        label = 'In Transit';
                    } else if (status === 'Delivered') {
                        percent = 100;
                        label = 'Delivered';
                    } else if (status === 'Lost') {
                        percent = 100;
                        label = 'Lost';
                        fill.style.background = '#e74c3c';
                    } else {
                        percent = 10;
                        label = 'Processing';
                    }
                    fill.style.width = percent + '%';
                    text.textContent = label;
                })
                .catch(() => {
                    fill.style.width = '10%';
                    text.textContent = 'Unknown';
                });
        }
    </script>
    </main>
</body>
</html>
