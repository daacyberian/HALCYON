<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product - HALCYON Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .admin-page { background: var(--color-bg); min-height: 100vh; }
        .admin-container { max-width: 500px; margin: 80px auto 40px; background: var(--color-surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 2.5rem; }
        .admin-container h2 { text-align: center; font-size: 1.75rem; font-weight: 600; color: var(--color-text); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--color-text); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 0.9375rem; }
        .form-textarea { min-height: 100px; resize: vertical; }
        .btn-submit { background: var(--color-success); color: #fff; border: none; padding: 0.875rem 1.5rem; border-radius: var(--radius-full); cursor: pointer; width: 100%; font-weight: 500; }
        .msg { margin: 1rem 0; text-align: center; }
        .msg.error { color: var(--color-error); }
        .msg.success { color: var(--color-success); }
    </style>
</head>
<body class="admin-page">
    <div class="admin-container">
        <h2>Add Product</h2>
        <div id="msg" class="msg"></div>
        <form id="addProductForm">
            <div class="form-group">
                <label class="form-label">Product Name</label>
                <input type="text" id="productName" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Price</label>
                <input type="number" id="productPrice" class="form-input" step="0.01" required>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="productCategory" class="form-select" required>
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="productDescription" class="form-textarea" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Add Product</button>
        </form>
    </div>
    <script type="module">
        import { setupProductForm } from './productLogic.js';
        setupProductForm();
    </script>
</body>
</html>
