<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HALCYON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        .admin-page { background: #fafafa; }
        .admin-sidebar { width: 260px; }
        .admin-content-area { padding: 2rem; }
        .admin-form-container { background: white; border-radius: 12px; padding: 2rem; margin-top: 2rem; }
    </style>
</head>
<body class="admin-page">
    <div id="dashboardContainer" style="display:none;">
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <div class="admin-sidebar-header">
                    <div class="admin-logo">HALCYON Admin</div>
                </div>
                <nav class="admin-sidebar-nav">
                    <a href="dashboard.html" class="admin-nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Dashboard
                    </a>
                    <a href="product.html" class="admin-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        Products
                    </a>
                    <a href="#" class="admin-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        Customers
                    </a>
                    <a href="#" class="admin-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Orders
                    </a>
                    <a href="#" class="admin-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>
                        Analytics
                    </a>
                    <a href="#" class="admin-nav-item" onclick="logout()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Logout
                    </a>
                </nav>
            </aside>
            
            <main class="admin-main">
                <header class="admin-header">
                    <h1 class="admin-header-title">Dashboard</h1>
                    <div class="admin-header-actions">
                        <button class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path></svg>
                            Notifications
                        </button>
                    </div>
                </header>
                
                <div class="admin-content-area">
                    <div class="admin-section">
                        <div class="admin-section-header">
                            <h2 class="admin-section-title">Analytics Overview</h2>
                            <button id="calcTotalSalesBtn" class="btn btn-primary">Calculate Total Sales</button>
                        </div>
                        <div class="admin-table-container">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Metric</th>
                                        <th>Value</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody id="analyticsTable">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">Total Products</span>
                                <div class="stat-card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path></svg>
                                </div>
                            </div>
                            <p class="stat-card-value" id="totalProducts">0</p>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">Total Orders</span>
                                <div class="stat-card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>
                                </div>
                            </div>
                            <p class="stat-card-value" id="totalOrders">0</p>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">Total Users</span>
                                <div class="stat-card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path></svg>
                                </div>
                            </div>
                            <p class="stat-card-value" id="totalUsers">0</p>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-header">
                                <span class="stat-card-title">Total Revenue</span>
                                <div class="stat-card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                </div>
                            </div>
                            <p class="stat-card-value" id="totalRevenue">$0</p>
                        </div>
                    </div>

                    <div class="admin-section">
                        <div class="admin-section-header">
                            <h2 class="admin-section-title">Manage Products</h2>
                            <button onclick="window.location.href='product.html'" class="btn btn-secondary">Add New Product</button>
                        </div>
                        <div class="admin-table-container">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Price</th>
                                        <th>Category</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="productsTable">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="admin-form-container">
                        <h2 class="admin-section-title" style="margin-bottom:1.5rem;">Add New Product</h2>
                        <div id="errorMessage" class="error-message" style="display:block;"></div>
                        <form id="addProductForm" onsubmit="handleAddProduct(event)">
                            <div class="admin-form-grid">
                                <div class="form-group">
                                    <label class="form-label" for="productName">Product Name</label>
                                    <input type="text" class="form-input" id="productName" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="productPrice">Price</label>
                                    <input type="number" class="form-input" id="productPrice" step="0.01" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="productCategory">Category</label>
                                    <select class="form-input" id="productCategory" required>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="productDescription">Description</label>
                                    <textarea class="form-input" id="productDescription" rows="3" required></textarea>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Product</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let editingProductId = null;

        // Check admin authentication and only show dashboard if authenticated
        window.onload = async function() {
            const adminToken = localStorage.getItem('adminToken');
            if (!adminToken) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('dashboardContainer').style.display = 'block';
            await loadDashboardData();
        };

        async function loadDashboardData() {
            try {
                // Fetch analytics for all time
                const analyticsRes = await fetch('https://ecom-backend-alpha-rust.vercel.app/admin/analytics/all', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                let analytics = [];
                if (analyticsRes.ok) {
                    analytics = await analyticsRes.json();
                }
                const analyticsTable = document.getElementById('analyticsTable');
                if (analytics.length === 0) {
                    analyticsTable.innerHTML = '<tr><td colspan="3">No analytics data available.</td></tr>';
                } else {
                    analyticsTable.innerHTML = analytics.map(row => `
                        <tr>
                            <td>${row.Metric}</td>
                            <td>${row.Value}</td>
                            <td>${new Date(row.Date).toLocaleDateString()}</td>
                        </tr>
                    `).join('');
                }

                const response = await fetch('https://ecom-backend-alpha-rust.vercel.app/admin/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('Failed to load dashboard data');
                }

                const data = await response.json();
                
                // Update statistics
                document.getElementById('totalProducts').textContent = data.totalProducts;
                document.getElementById('totalOrders').textContent = data.totalOrders;
                document.getElementById('totalUsers').textContent = data.totalUsers;
                document.getElementById('totalRevenue').textContent = `$${data.totalRevenue.toFixed(2)}`;

                // Update products table
                const productsTable = document.getElementById('productsTable');
                productsTable.innerHTML = data.products.map(product => {
                    if (editingProductId === product.ProductID) {
                        // Show editable row
                        return `
                            <tr>
                                <td>${product.ProductID}</td>
                                <td><input type="text" id="editName" value="${product.Name}"></td>
                                <td><input type="number" id="editPrice" value="${product.Price}"></td>
                                <td>
                                    <select id="editCategory">
                                        ${data.categories.map(cat =>
                                            `<option value="${cat.CategoryID}" ${cat.CategoryID === product.CategoryID ? 'selected' : ''}>${cat.Name}</option>`
                                        ).join('')}
                                    </select>
                                </td>
                                <td>
                                    <button class="action-btn submit-btn" onclick="submitEditProduct(${product.ProductID})">Save</button>
                                    <button class="action-btn delete-btn" onclick="cancelEdit()">Cancel</button>
                                </td>
                            </tr>
                        `;
                    } else {
                        // Normal row
                        return `
                            <tr>
                                <td>${product.ProductID}</td>
                                <td>${product.Name}</td>
                                <td>$${product.Price.toFixed(2)}</td>
                                <td>${product.CategoryName}</td>
                                <td>
                                    <button class="action-btn edit-btn" onclick="editProduct(${product.ProductID})">Edit</button>
                                    <button class="action-btn delete-btn" onclick="deleteProduct(${product.ProductID})">Delete</button>
                                </td>
                            </tr>
                        `;
                    }
                }).join('');

                // Update category dropdown
                const categorySelect = document.getElementById('productCategory');
                if (data.categories && data.categories.length > 0) {
                    categorySelect.innerHTML = data.categories.map(category => 
                        `<option value="${category.CategoryID}">${category.Name}</option>`
                    ).join('');
                } else {
                    categorySelect.innerHTML = '<option value="">No categories found</option>';
                }

            } catch (error) {
                console.error('Error loading dashboard data:', error);
                showError('Failed to load dashboard data');
            }
        }

        async function handleAddProduct(event) {
            event.preventDefault();
            
            const productData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                categoryId: parseInt(document.getElementById('productCategory').value),
                description: document.getElementById('productDescription').value
            };

            try {
                const response = await fetch('https://ecom-backend-alpha-rust.vercel.app/admin/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    },
                    body: JSON.stringify(productData)
                });

                if (!response.ok) {
                    throw new Error('Failed to add product');
                }

                // Reset form and reload data
                event.target.reset();
                await loadDashboardData();
                showSuccess('Product added successfully!');
            } catch (error) {
                console.error('Error adding product:', error);
                showError('Failed to add product');
            }
        }

        async function deleteProduct(productId) {
            if (!confirm('Are you sure you want to delete this product?')) {
                return;
            }

            try {
                const response = await fetch(`https://ecom-backend-alpha-rust.vercel.app/admin/products/${productId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to delete product');
                }

                await loadDashboardData();
                showSuccess('Product deleted successfully!');
            } catch (error) {
                console.error('Error deleting product:', error);
                showError('Failed to delete product');
            }
        }

        function editProduct(productId) {
            editingProductId = productId;
            loadDashboardData();
        }

        function cancelEdit() {
            editingProductId = null;
            loadDashboardData();
        }

        async function submitEditProduct(productId) {
            const name = document.getElementById('editName').value;
            const price = parseFloat(document.getElementById('editPrice').value);
            const categoryId = parseInt(document.getElementById('editCategory').value);

            try {
                const response = await fetch(`https://ecom-backend-alpha-rust.vercel.app/admin/products/${productId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    },
                    body: JSON.stringify({ name, price, categoryId })
                });

                if (!response.ok) {
                    throw new Error('Failed to update product');
                }

                editingProductId = null;
                await loadDashboardData();
                showSuccess('Product updated successfully!');
            } catch (error) {
                console.error('Error updating product:', error);
                showError('Failed to update product');
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            alert(message); // You can replace this with a better success message UI
        }

        document.getElementById('calcTotalSalesBtn').onclick = async function() {
            const res = await fetch('https://ecom-backend-alpha-rust.vercel.app/admin/analytics/calculate-total-sales', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                }
            });
            if (res.ok) {
                await loadDashboardData();
                alert('Total sales calculated and analytics updated!');
            } else {
                alert('Failed to calculate total sales.');
            }
        }
    </script>
</body>
</html>
