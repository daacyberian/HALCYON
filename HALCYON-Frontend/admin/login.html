<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - HALCYON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); padding: 2rem; }
        .admin-login-container { background: var(--color-surface); padding: 2.5rem; border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); width: 90%; max-width: 400px; }
        .admin-login-container h1 { text-align: center; margin-bottom: 2rem; font-size: 1.75rem; font-weight: 600; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 0.9375rem; }
        .form-input:focus { outline: none; border-color: var(--color-primary); }
        .btn-primary { width: 100%; padding: 0.875rem; background: var(--color-primary); color: white; border: none; border-radius: var(--radius-full); font-weight: 500; cursor: pointer; }
        .btn-primary:hover { background: var(--color-primary-dark); }
        .error-message { color: var(--color-error); text-align: center; margin-top: 1rem; padding: 0.75rem; background: var(--color-bg-alt); border-radius: var(--radius-md); display: none; }
        .back-to-home { text-align: center; margin-top: 1.5rem; }
        .back-to-home a { color: var(--color-accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <h1>Admin Login</h1>
        <div id="errorMessage" class="error-message"></div>
        <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label for="adminEmail">Email</label>
                <input type="email" id="adminEmail" class="form-input" required placeholder="Enter admin email">
            </div>
            <div class="form-group">
                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" class="form-input" required placeholder="Enter admin password">
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
        <div class="back-to-home">
            <a href="../index.html">← Back to Store</a>
        </div>
    </div>

    <script>
        function isValidEmail(email) {
            // Basic email format check
            return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email);
        }

        async function handleAdminLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('errorMessage');

            // Frontend validation
            if (!isValidEmail(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.style.display = 'block';
                return;
            }
            if (!password) {
                errorDiv.textContent = 'Password cannot be empty';
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';
            
            try {
                console.log('Admin token:', localStorage.getItem('adminToken'));
                const response = await fetch('https://ecom-backend-alpha-rust.vercel.app/auth/admin-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store admin token
                    localStorage.setItem('adminToken', data.token);
                    // Redirect to admin dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid admin credentials';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error connecting to server';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
